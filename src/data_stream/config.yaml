
# CHTS-Advanced-Materials: System Configuration
# This file defines sensor mappings, sampling rates, and hardware thresholds.

system:
  name: "CHTS-Alpha-Unit"
  version: "1.0.0"
  environment: "production"

# Data acquisition settings
acquisition:
  sample_rate_hz: 10.0
  buffer_size: 1024
  timeout_ms: 500

# Sensor pin mapping and calibration offsets
sensors:
  pressure_transducer:
    pin: "A0"
    calibration_offset: 0.05
    unit: "Pa"
  thermocouple_inlet:
    pin: "T1"
    calibration_offset: 0.0
    unit: "Celsius"
  thermocouple_outlet:
    pin: "T2"
    calibration_offset: 0.0
    unit: "Celsius"
  flow_meter:
    pin: "D5"
    unit: "kg/s"

# Hardware Actuator configuration
actuators:
  intake_valve:
    pin: "PWM1"
    safe_state: "CLOSED"
  bypass_valve:
    pin: "PWM2"
    safe_state: "OPEN"

# Operational thresholds imported by the AI Observer
thresholds:
  max_pressure_drop: 500.0
  safety_temp_limit: 85.0
