# CHTS-Advanced-Materials: System Configuration
# This file governs the operational thresholds for the 5-stage cascade.

system_metadata:
  version: "1.0"
  mode: "production"
  log_level: "INFO"

thresholds:
  # Fouling threshold: Triggers Self-Healing (1.0 = High resistance)
  fouling_limit: 0.5
  # Stage 5 entropy limit: Threshold for exit thermal equilibrium
  stage_5_entropy: 30.0
  # Pressure safety: Max allowable delta-P before E-Stop
  max_pressure_delta: 5.0

hardware_settings:
  sampling_rate_hz: 10.0
  bypass_valve_default: "closed"
  intake_valve_default: 50

# Simulation-in-the-Loop (SiL) Settings
simulation:
  enabled: false
  time_step: 0.1
  noise_factor: 0.02
